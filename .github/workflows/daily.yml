name: Daily LeetCode Log

on:
  schedule:
    # Runs every day at 7:00 AM UTC (2:30 PM IST / 3 AM ET)
    - cron: '0 7 * * *'
  workflow_dispatch: # Allow manual trigger from Actions tab

jobs:
  log-daily-problem:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch and log today's LeetCode problem
        run: python fetch_daily.py

      - name: Commit and push
        run: |
          git config user.name "Anshit"
          git config user.email "arajput@binghamton.edu"
          git add log.md
          # Only commit if log.md actually changed
          git diff --cached --quiet || git commit -m "daily: leetcode log $(date +'%Y-%m-%d')"
          git push
